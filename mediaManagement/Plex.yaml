version: '2.1'
services:
    plex:
        image: lscr.io/linuxserver/plex:latest
        container_name: plex
        network_mode: host
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Etc/UTC
            - VERSION=docker
        volumes:
            - /mnt/data/appdata/plex:/config
            - /mnt/data/media:/data/media
        restart: unless-stopped
