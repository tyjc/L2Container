version: '2.1'
services:
    jackett:
        image: lscr.io/linuxserver/jackett:latest
        container_name: jackett
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Etc/UTC
        volumes:
            - /mnt/data/appdata/jackett:/config
            - /mnt/data:/data
        ports:
            - 9117:9117
        restart: unless-stopped
